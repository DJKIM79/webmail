<svg version="1.2" baseProfile="tiny-ps" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>OnTo Webmail Logo</title>
  
  <!-- Main Envelope Body -->
  <rect x="2" y="5" width="28" height="20" rx="3" fill="#ec4899" />
  
  <!-- Bottom & Side Fold Lines -->
  <path d="M 2,25 L 12,16 M 30,25 L 20,16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 2,25 H 30" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />

  <!-- Top Flap (folds down) -->
  <path d="M 2,5 L 16,16 L 30,5 Z" fill="#8b5cf6" />
  
  <!-- Flap highlight border -->
  <path d="M 2,5 L 16,16 L 30,5" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />
</svg>
